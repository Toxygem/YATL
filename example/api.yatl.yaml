name: Test API
base_url: http://localhost:8000

steps:

  - name: Get user
    request:
      method: GET
      url: /users/1
    expect:
      status: 200
      body:
        json:
          name: John Doe
          age: 30
          info.email: john.doe@example.com
          info.phone: "1234567890"

  - name: Get user not found
    request:
      method: GET
      url: /users/2
    expect:
      status: 404

  - name: Create user
    request:
      method: POST
      url: /users
      body:
        json:
          name: Mike Doe
          age: 20
          info:
            email: mike.doe@example.com
            phone: "2354567890"
    expect:
      status: 201
      body:
        json:
          name: Mike Doe
          age: 20
          info.email: mike.doe@example.com
          info.phone: "2354567890"

  - name: Get user count
    request:
      method: GET
      url: /users
    expect:
      status: 200
      body:
        json:
          count: 2